{% extends "entries/base.html" %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">✍️</div>
        <h1 class="text-3xl font-bold italic">How are you feeling today?</h1>
    </div>

    <div class="card bg-base-100 shadow-xl p-6 border">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-semibold">{{ field.label }}</span>
                    </label>

                    <div class="mood-input-wrapper">
                        {{ field }}
                    </div>

                    {% if field.help_text %}
                        <label class="label">
                            <span class="label-text-alt text-gray-400">{{ field.help_text }}</span>
                        </label>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="pt-4">
                <button type="submit" class="btn btn-primary flex-1 text-white">Save Record</button>
                {% if object %}
                    <a href="{% url 'emotion-delete' object.pk %}" class="btn btn-error btn-outline">Delete</a>
                {% endif %}
            </div>
        </form>
    </div>

    <div class="mt-4 text-center">
        <a href="{% url 'index' %}" class="link link-hover text-gray-500">Cancel and Go Back</a>
    </div>
</div>

<style>
    select, input[type="text"] {
        width: 100% !important;
        height: 3rem !important;
        padding: 0 1rem !important;
        border-radius: 1rem !important;
        border: 1px solid #e5e7eb !important;
        background-color: #f9fafb !important;
    }

    textarea {
        width: 100% !important;
        padding: 1rem !important;
        border-radius: 1rem !important;
        border: 1px solid #e5e7eb !important;
        background-color: #f9fafb !important;
        min-height: 120px !important;
    }
    select:focus, input:focus, textarea:focus {
        outline: 2px solid var(--p) !important;
        outline-offset: 2px !important;
        background-color: white !important;
    }
</style>
{% endblock %}
