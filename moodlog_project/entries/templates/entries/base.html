<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodLog</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body class="bg-base-200 min-h-screen">
    <nav class="navbar bg-white shadow-sm px-4 md:px-10 flex justify-between items-center mb-8">
        <div class="flex-none">
            <a href="{% url 'index' %}" class="text-2xl font-black text-primary flex items-center gap-2">
                <span>🌈</span> MoodLog
            </a>
        </div>
        <div class="flex items-center gap-2">
            {% if user.is_authenticated %}
                <a href="{% url 'emotion-stats' %}" class="btn btn-ghost btn-sm">Stats</a>
                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-ghost btn-sm font-bold">
                        Hello, {{ user.username }} ▼
                    </div>
                    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-48 p-2 shadow-xl border border-gray-100 mt-2">
                        <li>
                            <form action="{% url 'logout' %}" method="post" class="w-full">
                                {% csrf_token %}
                                <button type="submit" class="text-error w-full text-left">Logout</button>
                            </form>
                        </li>
                    </ul>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-ghost btn-sm">Login</a>
                <a href="{% url 'signup' %}" class="btn btn-primary btn-sm text-white">Register</a>
            {% endif %}
        </div>
    </nav>
    <main class="container mx-auto p-4 max-w-2xl bg-white rounded-xl shadow-md min-h-[60vh]">
        {% block content %}
        {% endblock%}
    </main>

</body>
</html>
