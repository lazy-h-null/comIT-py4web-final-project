{% extends "entries/base.html" %}

{% block content %}
<div class="max-w-md mx-auto card bg-base-100 shadow-xl border p-8">
    <h2 class="text-2xl font-bold mb-6 text-center text-secondary">Create an Account</h2>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="form-container">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-secondary w-full text-white mt-4">Sign Up</button>
    </form>

    <p class="mt-6 text-center text-sm">
        Already have an account? <a href="{% url 'login' %}" class="link link-secondary">Login</a>
    </p>
</div>

<style>
    .form-container input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
        display: block;
    }
    
    .form-container p {
        font-size: 13px;
        color: #666;
        margin-bottom: 5px;
    }

    .form-container ul {
        font-size: 11px;
        color: #888;
        margin-left: 20px;
        margin-bottom: 15px;
        list-style-type: disc;
    }

    .errorlist {
        color: red;
        font-size: 12px;
        list-style: none;
    }
</style>
{% endblock %}
