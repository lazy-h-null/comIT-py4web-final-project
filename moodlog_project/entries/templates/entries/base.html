<!DOCTYPE html>
<html lang="en" data-theme="{% block theme %}autumn{% endblock %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodLog</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body class="bg-base-200 min-h-screen">
    <!-- navigation bar -->
    <nav class="navbar bg-base-100 shadow-sm px-4 md:px-10 flex justify-between items-center mb-8">
        <div class="flex-none">
            <a href="{% url 'index' %}" class="text-2xl font-black text-primary flex items-center gap-2 italic">
                <span>🌈</span> MoodLog
            </a>
        </div>
        <div class="flex items-center gap-2">
            {% if user.is_authenticated %}
                <a href="{% url 'emotion-stats' %}" class="btn btn-ghost btn-sm">Stats</a>
                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-ghost btn-sm font-bold">
                        Hello, {{ user.username }} ▼
                    </div>
                    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-48 p-2 shadow-xl border border-gray-100 mt-2">
                        <li><a href="{% url 'password_change' %}">Change PW</a></li>
                        <div class="divider my-0"></div>
                        <li>
                            <form action="{% url 'logout' %}" method="post" class="w-full">
                                {% csrf_token %}
                                <button type="submit" class="text-error w-full text-left">Logout</button>
                            </form>
                        </li>
                    </ul>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-ghost btn-sm">Login</a>
                <a href="{% url 'signup' %}" class="btn btn-primary btn-sm text-white">Register</a>
            {% endif %}
        </div>
    </nav>
    <!-- messages -->
    <div class="container mx-auto max-w-2xl px-4">
        {% if messages %}
            {% for message in messages %}
                <div role="alert" class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-info{% endif %} shadow-md mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="h-6 w-6 shrink-0 stroke-current">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <main class="container mx-auto p-6 max-w-3xl bg-base-100 rounded-xl shadow-md min-h-[60vh]">
        {% block content %}
        {% endblock%}
    </main>

</body>
</html>
