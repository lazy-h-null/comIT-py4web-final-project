{% extends "entries/base.html" %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">How are you feeling today?</h1>

    <div class="card bg-base-100 shadow-xl p-6 border">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-semibold">{{ field.label }}</span>
                    </label>

                    {{ field }}
                    {% if field.help_text %}
                        <label class="label">
                            <span class="label-text-alt text-gray-400">{{ field.help_text }}</span>
                        </label>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="pt-4">
                <button type="submit" class="btn btn-primary w-full text-white">Save Record</button>
            </div>
        </form>
    </div>

    <div class="mt-4 text-center">
        <a href="{% url 'index' %}" class="link link-hover text-gray-500">Cancel and Go Back</a>
    </div>
</div>

<style>
    input, select, textarea {
        @apply input input-bordered w-full;
    }
    textarea {
        @apply textarea h-24;
    }
</style>
{% endblock %}
