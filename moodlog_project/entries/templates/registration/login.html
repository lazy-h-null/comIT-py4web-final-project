{% extends "entries/base.html" %}

{% block theme %}cupcake{% endblock %}

{% block content %}
<div class="max-w-md mx-auto card bg-base-100 shadow-xl border p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">Login to MoodLog</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="form-control">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary w-full text-white mt-4">Login</button>
    </form>

    <p class="mt-6 text-center text-sm">
        Don't have an account?<a href="{% url 'signup' %}" class="link link-primary">Register here</a>
    </p>
</div>

<style>
    .form-container input {
        width: 100%;
        padding: 10px;
        border: 1px soild #ccc;
        border-radius: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
        display: block;
    }

    .form-container label {
        font-weight: bold;
        font-size: 0.9rem;
    }
</style>
{% endblock %}
